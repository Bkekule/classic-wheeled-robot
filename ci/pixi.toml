[workspace]
name = "robostack"
description = "RoboStack ROS 2 Jazzy environment"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[target.unix.activation]
env = { RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp", ROS_SETUP_SOURCED = "1" }

[feature.build.target.unix.tasks]
build = "colcon build --symlink-install --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY"

# Dependencies used by all environments
[dependencies]
pre-commit = "*"
python = "*"
# Compilers
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
# ROS specific tools
rosdep = "*"
colcon-common-extensions = "*"
# Gazebo tools
gz-sim = "*"

[environments]
jazzy = { features = ["jazzy", "build"] }

[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
ros-jazzy-desktop = "*"
ros-jazzy-gz-ros2-control = "*"
ros-jazzy-joint-state-publisher = "*"
ros-jazzy-rmw-cyclonedds-cpp = ">=2.2.3,<3"
ros-jazzy-robot-state-publisher = "*"
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"
ros-jazzy-ros-gz-bridge = "*"
ros-jazzy-ros-gz-sim = "*"
ros-jazzy-rviz-default-plugins = "*"
ros-jazzy-xacro = "*"

[feature.jazzy.tasks]
pre-commit = "cd .. && pre-commit run --all-files"
run-tests = "cd .. && colcon test --packages-select my_robot_description"
rviz-launch = "cd .. && colcon build --packages-select my_robot_bringup my_robot_description && bash -c 'source install/setup.bash && ros2 launch my_robot_bringup display.launch.py'"
gz-server-launch = "cd .. && colcon build --packages-select my_robot_bringup my_robot_description && bash -c 'source install/setup.bash && ros2 launch my_robot_bringup gazebo_server.launch.py'"
