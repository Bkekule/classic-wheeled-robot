[workspace]
name = "robostack"
description = "RoboStack ROS 2 Jazzy environment"
channels = ["https://prefix.dev/conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[target.unix.activation]
env = { RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp", ROS_SETUP_SOURCED = "1", CMAKE_GENERATOR = "Ninja", OGRE_PLUGIN_PATH = "$CONDA_PREFIX/lib/OGRE-Next", OGRE_RESOURCE_PATH = "$CONDA_PREFIX/lib/OGRE", OGRE2_RESOURCE_PATH = "$CONDA_PREFIX/lib/OGRE-Next", GZ_RENDER_PLUGIN_PATH = "$CONDA_PREFIX/lib/OGRE-Next" }

# Dependencies used by all environments
[dependencies]
pre-commit = "*"
python = "*"
# Compilers
compilers = "*"
cmake = "*"
pkg-config = "*"
ninja = "*"
# ROS specific tools
colcon-common-extensions = "*"

[environments]
jazzy = { features = ["jazzy"] }

[feature.jazzy]
channels = ["https://prefix.dev/robostack-jazzy"]

[feature.jazzy.dependencies]
ros-jazzy-desktop = "*"
ros-jazzy-gz-ros2-control = "*"
ros-jazzy-rmw-cyclonedds-cpp = ">=2.2.3,<3"
ros-jazzy-robot-state-publisher = "*"
ros-jazzy-ros2-control = "*"
ros-jazzy-ros2-controllers = "*"
ros-jazzy-ros-gz-bridge = "*"
ros-jazzy-ros-gz-sim = "*"
ros-jazzy-xacro = "*"

[feature.jazzy.tasks]
pre-commit = "cd .. && pre-commit run --all-files"
run-tests = "cd ../src && colcon build --symlink-install && colcon test && colcon test-result --verbose"
rviz-launch = "cd ../src && colcon build --symlink-install && bash -c 'source install/setup.bash && ros2 launch robot_bringup display.launch.py'"
gz-server-launch = "cd ../src && colcon build --symlink-install && bash -c 'source install/setup.bash && ros2 launch robot_bringup gazebo_server.launch.py'"
rqt-graph-launch = "cd ../src && colcon build --symlink-install && bash -c 'source install/setup.bash && ros2 run rqt_graph rqt_graph'"
