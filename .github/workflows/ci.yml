name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  pre-commit:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Setup robostack environment
        run: |
          pixi init robostack
          cp ci/pixi.toml robostack/pixi.toml
          cd robostack
          pixi install

      - name: Run pre-commit hooks
        working-directory: robostack
        run: pixi run -e jazzy pre-commit

  test:
    permissions:
      contents: read
    runs-on: ubuntu-24.04

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install pixi
        run: |
          curl -fsSL https://pixi.sh/install.sh | bash
          echo "$HOME/.pixi/bin" >> "$GITHUB_PATH"

      - name: Setup robostack environment
        run: |
          pixi init robostack
          cp ci/pixi.toml robostack/pixi.toml
          cd robostack
          pixi install

      - name: Run tests
        working-directory: robostack
        run: pixi run -e jazzy run-tests
