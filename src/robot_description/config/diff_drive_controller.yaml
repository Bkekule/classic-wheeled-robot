diff_drive_controller:
  ros__parameters:
    left_wheel_names: ["chassis_to_left_wheel_joint"]
    right_wheel_names: ["chassis_to_right_wheel_joint"]

    wheel_separation: 0.25  # chassis_width (0.2) + wheel_length (0.05)
    wheel_radius: 0.1

    odom_frame_id: odom
    base_frame_id: robot_footprint
    enable_odom_tf: true

    pose_covariance_diagonal:
      [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal:
      [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]

    publish_rate: 50.0  # Cannot be higher than controller_manager's update_rate

    # Body Level Limits
    linear:  # m/s
      x:
        min_velocity: -1.0
        max_velocity: 1.0
    angular:  # rad/s
      z:
        min_velocity: -1.0
        max_velocity: 1.0
