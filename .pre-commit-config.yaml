repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 'v6.0.0'
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: sort-simple-yaml
      - id: mixed-line-ending
      - id: check-yaml
      - id: check-xml
      - id: check-executables-have-shebangs
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-case-conflict

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.24.1
    hooks:
      - id: zizmor

  - repo: local
    hooks:
      - id: check-launch-deps-robot-bringup
        name: "robot_bringup: launch imports vs package.xml"
        entry: python3 ci/check_static_deps.py src/robot_bringup --mode launch
        language: python
        files: ^src/robot_bringup/(launch/.*\.launch\.py|package\.xml)$
        pass_filenames: false
      - id: check-test-deps-robot-description
        name: "robot_description: test imports vs package.xml"
        entry: python3 ci/check_static_deps.py src/robot_description --mode test
        language: python
        files: ^src/robot_description/(tests/.*\.py|package\.xml)$
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
